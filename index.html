<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:oklch(0.07 0.015 270);
    --bg2:oklch(0.10 0.02 270);
    --bg3:oklch(0.13 0.025 270);
    --glass:oklch(0.12 0.03 270 / 0.55);
    --glass-border:oklch(0.30 0.06 290 / 0.15);
    --primary:oklch(0.62 0.30 290);
    --primary-dim:oklch(0.50 0.22 290);
    --primary-glow:oklch(0.62 0.30 290 / 0.35);
    --primary-subtle:oklch(0.62 0.30 290 / 0.08);
    --accent:oklch(0.70 0.25 310);
    --text:oklch(0.92 0.02 270);
    --text-dim:oklch(0.55 0.03 270);
    --text-muted:oklch(0.40 0.02 270);
    --font-body:'Space Grotesk',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--text);
    font-family:var(--font-body);overflow-x:hidden;
    line-height:1.6;cursor:default;
  }
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--primary-dim);border-radius:2px}

  /* ─── Grain Overlay ─── */
  #grain{
    position:fixed;inset:0;z-index:9999;pointer-events:none;
    opacity:0.035;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat:repeat;background-size:256px 256px;
  }

  /* ─── Cursor Spotlight ─── */
  #cursor-spot{
    position:fixed;inset:0;z-index:9998;pointer-events:none;
    background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),oklch(0.62 0.30 290 / 0.06),transparent 70%);
    transition:background 0.15s ease;
  }

  /* ─── Glass base ─── */
  .glass{
    background:var(--glass);backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:16px;
  }
  .glass-lg{border-radius:24px}

  /* ─── Animations ─── */
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes float-slow{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes pulse-glow{0%,100%{box-shadow:0 0 20px var(--primary-glow)}50%{box-shadow:0 0 40px var(--primary-glow),0 0 60px var(--primary-glow)}}
  @keyframes spin-slow{to{transform:rotate(360deg)}}
  @keyframes spin-reverse{to{transform:rotate(-360deg)}}
  @keyframes orbit-1{from{transform:rotate(0deg) translateX(140px) rotate(0deg)}to{transform:rotate(360deg) translateX(140px) rotate(-360deg)}}
  @keyframes orbit-2{from{transform:rotate(60deg) translateX(140px) rotate(-60deg)}to{transform:rotate(420deg) translateX(140px) rotate(-420deg)}}
  @keyframes orbit-3{from{transform:rotate(120deg) translateX(140px) rotate(-120deg)}to{transform:rotate(480deg) translateX(140px) rotate(-480deg)}}
  @keyframes orbit-4{from{transform:rotate(180deg) translateX(140px) rotate(-180deg)}to{transform:rotate(540deg) translateX(140px) rotate(-540deg)}}
  @keyframes orbit-5{from{transform:rotate(240deg) translateX(140px) rotate(-240deg)}to{transform:rotate(600deg) translateX(140px) rotate(-600deg)}}
  @keyframes orbit-6{from{transform:rotate(300deg) translateX(140px) rotate(-300deg)}to{transform:rotate(660deg) translateX(140px) rotate(-660deg)}}

  @keyframes reveal-up{from{opacity:0;transform:translateY(40px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes reveal-scale{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
  @keyframes glow-pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes border-dance{0%{background-position:0 0}100%{background-position:200% 0}}
  @keyframes noise-anim{0%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,2%)}30%{transform:translate(-1%,4%)}40%{transform:translate(4%,-2%)}50%{transform:translate(-3%,1%)}60%{transform:translate(2%,-4%)}70%{transform:translate(-4%,-1%)}80%{transform:translate(1%,3%)}90%{transform:translate(-2%,-2%)}100%{transform:translate(0,0)}}
  @keyframes notifIn{0%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(0.92)}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
  @keyframes notifOut{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(0.92)}}

  .reveal{opacity:0;transform:translateY(30px);transition:all 0.8s cubic-bezier(0.22,1,0.36,1)}
  .reveal.in-view{opacity:1;transform:translateY(0)}

  /* ─── Section ─── */
  .section-wrap{max-width:1200px;margin:0 auto;padding:120px 32px;position:relative;z-index:1}
  .section-label{font-family:var(--font-mono);font-size:0.75rem;color:var(--primary);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px}
  .section-title{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:56px}

  /* ─── Bento Grid ─── */
  .bento-grid{display:grid;gap:16px;grid-template-columns:repeat(12,1fr)}
  .bento-cell{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;padding:28px;transition:all 0.4s cubic-bezier(0.22,1,0.36,1);position:relative;overflow:hidden}
  .bento-cell:hover{border-color:var(--primary);box-shadow:0 0 30px var(--primary-glow);transform:translateY(-2px)}
  .bento-cell::before{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(800px circle at var(--mx,50%) var(--my,50%),var(--primary-subtle),transparent 60%);opacity:0;transition:opacity 0.4s;pointer-events:none}
  .bento-cell:hover::before{opacity:1}

  /* ─── Button styles ─── */
  .btn-primary,.btn-ghost{
    display:inline-flex;align-items:center;gap:8px;padding:12px 28px;
    border-radius:100px;font-family:var(--font-body);font-size:0.9rem;
    font-weight:600;cursor:pointer;text-decoration:none;
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden;
  }
  .btn-primary{
    background:var(--primary);border:none;color:#fff;
    box-shadow:0 0 20px var(--primary-glow);
  }
  .btn-primary:hover{box-shadow:0 0 40px var(--primary-glow),0 0 60px var(--primary-glow);transform:translateY(-2px) scale(1.02)}
  .btn-ghost{
    background:transparent;border:1px solid var(--glass-border);color:var(--text);
  }
  .btn-ghost:hover{border-color:var(--primary);color:var(--primary);box-shadow:0 0 20px var(--primary-glow);transform:translateY(-2px)}

  .magnetic-wrap{display:inline-flex}

  /* ─── Scroll Indicator ─── */
  .scroll-ind{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-muted);font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.15em;animation:float-slow 3s ease-in-out infinite}
  .scroll-ind .line{width:1px;height:40px;background:linear-gradient(to bottom,var(--text-muted),transparent);animation:glow-pulse 2s ease-in-out infinite}

  /* ─── Dock ─── */
  .dock-wrap{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;
  }
  .dock{
    display:flex;align-items:center;gap:4px;
    background:oklch(0.10 0.03 270 / 0.7);backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    border:1px solid var(--glass-border);border-radius:20px;
    padding:6px 8px;
    box-shadow:0 4px 40px oklch(0 0 0 / 0.5),0 0 20px var(--primary-glow);
  }
  .dock-btn{
    display:flex;align-items:center;justify-content:center;
    width:40px;height:40px;border-radius:12px;border:none;
    background:transparent;color:var(--text-dim);cursor:pointer;
    transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position:relative;font-size:1.1rem;
  }
  .dock-btn:hover,.dock-btn.active{background:var(--primary-subtle);color:var(--primary);transform:translateY(-4px)}
  .dock-btn.active{color:var(--primary)}
  .dock-btn .tooltip{
    position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:var(--bg3);border:1px solid var(--glass-border);border-radius:8px;
    padding:4px 10px;font-size:0.7rem;font-family:var(--font-mono);
    color:var(--text-dim);white-space:nowrap;opacity:0;pointer-events:none;
    transition:opacity 0.2s;
  }
  .dock-btn:hover .tooltip{opacity:1}
  .dock-sep{width:1px;height:24px;background:var(--glass-border);margin:0 4px}

  /* ─── Project Overlay Animations ─── */
  @keyframes pr-scanlines{0%,100%{opacity:1}50%{opacity:0.5}}
  @keyframes pr-glitch{0%{top:20%;opacity:1}33%{top:60%;opacity:0.7}66%{top:40%;opacity:1}100%{top:70%;opacity:0.5}}
  @keyframes pr-sparkle{0%{transform:translateY(0) scale(0);opacity:1}60%{opacity:1}100%{transform:translateY(-60px) scale(1.3);opacity:0}}
  @keyframes pr-scan{from{top:-2px}to{top:100%}}
  @keyframes pr-matrix{0%{opacity:0;transform:translateY(-10px)}10%{opacity:1}90%{opacity:1}100%{opacity:0;transform:translateY(6px)}}

    .section-wrap{padding:80px 20px}

    .dock-sep{margin:0 2px}

  @media(max-width:480px){
    .bento-grid{grid-template-columns:1fr 1fr}
  }
</style>

<script>
// Star background (upgraded)
(function(){
  const c=document.getElementById('star-canvas'),ctx=c.getContext('2d');
  let W,H,stars=[],meteors=[],animId,t=0;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  function initStars(n){
    stars=[];
    for(let i=0;i<n;i++)stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.6+0.2,
      a:Math.random()*0.6+0.1,
      sp:Math.random()*0.15+0.02,
      dr:(Math.random()-0.5)*0.06,
      tw:Math.random()*Math.PI*2,
      ts:Math.random()*0.025+0.005,
    });
    meteors=[];
    for(let i=0;i<3;i++)meteors.push({
      x:Math.random()*W,y:Math.random()*H*0.3,
      len:80+Math.random()*120,sp:3+Math.random()*4,
      a:0,life:0,
    });
  }
  function draw(){
    t++;ctx.clearRect(0,0,W,H);
    // stars
    stars.forEach(s=>{
      s.tw+=s.ts;const al=s.a*(0.5+0.5*Math.sin(s.tw));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,170,255,${al})`;ctx.fill();
      s.y-=s.sp;s.x+=s.dr;
      if(s.y<-2){s.y=H+2;s.x=Math.random()*W}
    });
    // connection lines (nearby stars)
    for(let i=0;i<stars.length;i+=4){
      for(let j=i+1;j<stars.length;j+=4){
        const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();ctx.moveTo(stars[i].x,stars[i].y);
          ctx.lineTo(stars[j].x,stars[j].y);
          ctx.strokeStyle=`rgba(200,170,255,${0.06*(1-dist/120)})`;
          ctx.lineWidth=0.4;ctx.stroke();
        }
      }
    }
    // meteors
    meteors.forEach(m=>{
      if(m.life<=0){
        m.x=Math.random()*W;m.y=Math.random()*H*0.4;
        m.life=80+Math.random()*120;m.a=1;
        m.sp=3+Math.random()*4;
      }
      ctx.beginPath();ctx.moveTo(m.x,m.y);
      const ex=m.x-m.sp*2.5,ey=m.y+m.sp*1.2;
      ctx.lineTo(ex,ey);
      const grad=ctx.createLinearGradient(m.x,m.y,ex,ey);
      grad.addColorStop(0,`rgba(200,170,255,${m.a})`);
      grad.addColorStop(1,`rgba(200,170,255,0)`);
      ctx.strokeStyle=grad;ctx.lineWidth=1.2;ctx.stroke();
      m.x-=m.sp*0.8;m.y+=m.sp*0.4;m.a-=0.012;m.life--;
    });
    // nebulae
    const nbs=[
      {x:W*0.2,y:H*0.25,r:300,c:'120,60,220'},
      {x:W*0.8,y:H*0.6,r:260,c:'90,30,180'},
      {x:W*0.5,y:H*0.8,r:220,c:'150,50,200'},
    ];
    nbs.forEach(n=>{
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`rgba(${n.c},${0.04+0.02*Math.sin(t*0.003)})`);
      g.addColorStop(1,`rgba(${n.c},0)`);
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    });
    animId=requestAnimationFrame(draw);
  }
  resize();initStars(250);draw();
  window.addEventListener('resize',()=>{resize();initStars(250)});
})();

// Cursor spotlight tracking
document.addEventListener('mousemove',e=>{
  const s=document.getElementById('cursor-spot');
  s.style.setProperty('--mx',e.clientX+'px');
  s.style.setProperty('--my',e.clientY+'px');
});

// Scroll reveal observer
const revealObserver=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){entry.target.classList.add('in-view')}
  });
},{threshold:0.1});

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.reveal').forEach(el=>revealObserver.observe(el));
});
</script>

/* ─── Helper Components ─── */
function MagneticWrap({children,strength=20}){
  const ref=useRef(null);
  const [pos,setPos]=useState({x:0,y:0});
  const handleMove=useCallback((e)=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=e.clientX-cx,dy=e.clientY-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const maxDist=200;
    const f=Math.max(0,1-dist/maxDist);
    setPos({x:dx*f*0.3,y:dy*f*0.3});
  },[]);
  const handleLeave=useCallback(()=>setPos({x:0,y:0}),[]);
  return(
    <div ref={ref} onMouseMove={handleMove} onMouseLeave={handleLeave}
      style={{display:'inline-flex',transform:`translate(${pos.x}px,${pos.y}px)`,transition:'transform 0.15s ease-out'}}>
      {children}
    </div>
  );
}

}

/* ─── Dock Navigation ─── */
function Dock(){
  const [active,setActive]=useState('hero');
  const handleClick=(id)=>{
    setActive(id);
    if(id==='hero'){
      window.scrollTo({top:0,behavior:'smooth'});
    }else{
      document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
    }
  };
  useEffect(()=>{
    const observer=new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting)setActive(entry.target.id);
      });
    },{threshold:0.3,rootMargin:'-80px 0px 0px 0px'});
    NAV_ITEMS.forEach(({id})=>{
      const el=document.getElementById(id);
      if(el)observer.observe(el);
    });
    return ()=>observer.disconnect();
  },[]);

  const icons=[svgHome,svgUser,svgCode,svgFolder,svgMail];
  return(
    <div className="dock-wrap">
      <div className="dock">
        {NAV_ITEMS.map((item,i)=>(
          <React.Fragment key={item.id}>
            {i>0&&<div className="dock-sep"/>}
            <button className={`dock-btn${active===item.id?' active':''}`} onClick={()=>handleClick(item.id)}
              aria-label={item.label}>
              {icons[i]()}
              <span className="tooltip">{item.label}</span>
            </button>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ─── Typewriter ─── */
function Typewriter({words}){
  const [idx,setIdx]=useState(0);
  const [text,setText]=useState('');
  const [deleting,setDeleting]=useState(false);
  const [paused,setPaused]=useState(false);
  useEffect(()=>{
    if(paused){const t=setTimeout(()=>setPaused(false),1400);return ()=>clearTimeout(t)}
    const word=words[idx%words.length];
    let t;
    if(!deleting){
      if(text.length<word.length)t=setTimeout(()=>setText(word.slice(0,text.length+1)),70);
      else{setPaused(true);setTimeout(()=>setDeleting(true),1200)}
    }else{
      if(text.length>0)t=setTimeout(()=>setText(text.slice(0,-1)),40);
      else{setDeleting(false);setIdx(i=>i+1)}
    }
    return ()=>clearTimeout(t);
  },[text,deleting,paused,idx,words]);
  return(
    <span>
      <span style={{color:'var(--primary)'}}>{text}</span>
      <span style={{animation:'blink 1s step-end infinite',color:'var(--primary)',marginLeft:2}}>|</span>
    </span>
  );
}

              style={{
                padding:'8px 18px',borderRadius:100,border:'1px solid',
                borderColor:filter===c.id?'var(--primary)':'var(--glass-border)',
                background:filter===c.id?'var(--primary)':'transparent',
                color:filter===c.id?'#fff':'var(--text-dim)',
                fontFamily:'var(--font-mono)',fontSize:'0.75rem',cursor:'pointer',
                transition:'all 0.25s cubic-bezier(0.34,1.56,0.64,1)',

        {/* Skills grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12}}>

}

function SkillCard({skill,index}){
  const [hovered,setHovered]=useState(false);
  const [animated,setAnimated]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setAnimated(true),200+index*60);return ()=>clearTimeout(t)},[]);

  const glows=[
    {shadow:'0 0 20px var(--primary-glow)',border:'var(--primary)'},
    {shadow:'0 0 20px oklch(0.70 0.25 310 / 0.4)',border:'var(--accent)'},
    {shadow:'0 0 20px oklch(0.50 0.22 290 / 0.5)',border:'var(--primary-dim)'},
  ];
  const g=glows[index%3];

  return(
    <div
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{
        position:'relative',background:hovered?'oklch(0.14 0.04 280)':'var(--glass)',
        backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',
        border:`1px solid ${hovered?g.border:'var(--glass-border)'}`,
        borderRadius:14,padding:'20px 16px',
        transition:'all 0.35s cubic-bezier(0.34,1.56,0.64,1)',
        boxShadow:hovered?g.shadow:'none',
        transform:hovered?'translateY(-4px) scale(1.02)':'none',
        cursor:'default',overflow:'hidden',
      }}
    >
      {/* Icon */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <img src={skill.icon} alt={skill.name} style={{
          width:22,height:22,
          filter:hovered?'drop-shadow(0 0 8px var(--primary-glow))':'drop-shadow(0 0 2px oklch(0.62 0.30 290 / 0.3))',
          transition:'filter 0.3s',
        }} />
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--text-muted)'}}>{skill.level}%</span>
      </div>
      <p style={{fontWeight:600,fontSize:'0.9rem',marginBottom:10,position:'relative',zIndex:1}}>{skill.name}</p>
      {/* Progress bar */}
      <div style={{height:3,background:'var(--bg3)',borderRadius:4,overflow:'hidden'}}>
        <div style={{
          height:'100%',width:animated?`${skill.level}%`:'0%',
          background:`linear-gradient(to right,${g.border},var(--primary))`,
          borderRadius:4,transition:'width 1s cubic-bezier(0.34,1.56,0.64,1)',
          boxShadow:`0 0 6px ${g.border}`,
        }} />
      </div>
      {/* Category tag */}
      <div style={{marginTop:10,fontSize:'0.6rem',fontFamily:'var(--font-mono)',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.1em'}}>
        {skill.cat}
      </div>
    </div>
  );
}

function ProjectCard({project,index,statusConfig}){
  const [hovered,setHovered]=useState(false);
  const [sparkles,setSparkles]=useState([]);
  const [matrix,setMatrix]=useState([]);
  const [notif,setNotif]=useState(null);

  useEffect(()=>{
    if(notif){const t=setTimeout(()=>setNotif(null),3200);return ()=>clearTimeout(t)}
  },[notif]);

  const showNotif=()=>{
    setNotif('show');
    setTimeout(()=>setNotif('leaving'),2800);
  };

  useEffect(()=>{
    if(!hovered){setSparkles([]);setMatrix([]);return}
    if(index===0){/* GorillaFang — 3D wireframe grid */}
    if(index===1)setSparkles(Array.from({length:12},(_,i)=>({id:i,x:5+Math.random()*90,delay:Math.random()*0.6,size:4+Math.random()*8,hue:270+Math.random()*60})));
    if(index===2)setMatrix(Array.from({length:12},(_,i)=>({id:i,x:i*8+Math.random()*5,char:['0','1','<','>','/','{','}','#','@','!','&','%'][i%12],delay:Math.random()*0.8,dur:0.5+Math.random()*0.7})));
  },[hovered,index]);

  const getOverlay=()=>{
    if(!hovered)return null;
    if(index===0)return(
      <div style={{position:'absolute',inset:0,borderRadius:24,pointerEvents:'none',overflow:'hidden',zIndex:2}}>
        {/* 3D wireframe grid */}
        <div style={{position:'absolute',inset:0,
          backgroundImage:`
            linear-gradient(rgba(168,85,247,0.06) 1px,transparent 1px),
            linear-gradient(90deg,rgba(168,85,247,0.06) 1px,transparent 1px)
          `,
          backgroundSize:'24px 24px',
          transform:'perspective(400px) rotateX(8deg)',
          transformOrigin:'center bottom',
        }} />
        {/* Floating geometric dots */}
        {[...Array(5)].map((_,i)=>(
          <div key={i} style={{

            left:`${15+i*18}%`,top:`${20+Math.sin(i)*15}%`,
            width:4,height:4,borderRadius:'50%',
            background:'oklch(0.62 0.30 290 / 0.25)',
            boxShadow:'0 0 12px oklch(0.62 0.30 290 / 0.3)',
            animation:`float-slow ${2+i*0.5}s ease-in-out ${i*0.2}s infinite`,
          }} />
        ))}
        {/* Corner brackets */}
        <svg style={{position:'absolute',top:12,left:12,width:24,height:24}} viewBox="0 0 24 24" fill="none" stroke="oklch(0.62 0.30 290 / 0.15)" strokeWidth="1.5">
          <path d="M4 4h6M4 4v6M20 20h-6M20 20v-6M4 20h6M4 20v-6M20 4h-6M20 4v6"/>
        </svg>
      </div>
    );
    if(index===1)return(
      <div style={{position:'absolute',inset:0,borderRadius:24,pointerEvents:'none',overflow:'visible',zIndex:2}}>
        {sparkles.map(s=>(
          <div key={s.id} style={{position:'absolute',left:`${s.x}%`,bottom:'15%',width:s.size,height:s.size,borderRadius:'50%',background:`oklch(0.72 0.28 ${s.hue})`,boxShadow:`0 0 8px oklch(0.65 0.28 ${s.hue})`,animation:`pr-sparkle 1.2s ease-out ${s.delay}s forwards`,opacity:0}} />
        ))}
      </div>
    );
    if(index===2)return(
      <div style={{position:'absolute',inset:0,borderRadius:24,pointerEvents:'none',overflow:'hidden',zIndex:2}}>
        <div style={{position:'absolute',left:0,right:0,height:'2px',background:'linear-gradient(to right,transparent,var(--primary),transparent)',boxShadow:'0 0 12px var(--primary)',animation:'pr-scan 1.4s linear infinite'}} />
        {matrix.map(c=>(
          <div key={c.id} style={{position:'absolute',left:`${c.x}%`,top:0,fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'var(--primary)',opacity:0,animation:`pr-matrix ${c.dur}s ease-in-out ${c.delay}s infinite`}}>{c.char}</div>
        ))}
      </div>
    );
    return null;
  };

  const transforms=[hovered?'perspective(800px) translateY(-6px) rotateX(4deg) scale(1.02)':null,hovered?'translateY(-10px) scale(1.025)':null,hovered?'perspective(800px) translateY(-6px) rotateY(-5deg)':null];

  return(
    <div
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      className="bento-cell glass-lg"
      style={{
        padding:'28px 24px',display:'flex',flexDirection:'column',
        transform:transforms[index]||(hovered?'translateY(-6px)':'none'),
        boxShadow:hovered?`0 16px 40px oklch(0 0 0 / 0.5), 0 0 30px var(--primary-glow)`:'0 4px 20px oklch(0 0 0 / 0.3)',
      }}
    >
      {/* Top accent */}
      <div style={{position:'absolute',top:0,left:24,right:24,height:2,background:hovered?'linear-gradient(to right,transparent,var(--primary),transparent)':'transparent',transition:'background 0.3s',zIndex:1,borderRadius:'0 0 2px 2px'}} />

      {getOverlay()}

      {/* Image */}
      {project.image&&(
        <div style={{marginBottom:18,borderRadius:14,overflow:'hidden',height:120,background:'oklch(0 0 0 / 0.4)',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--glass-border)',position:'relative',zIndex:1}}>
          <img src={project.image} alt={project.title} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center',transition:'transform 0.4s ease,filter 0.4s ease',transform:hovered?'scale(1.06)':'scale(1)',filter:hovered?'brightness(1.15)':'brightness(0.9)'}} />
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,position:'relative',zIndex:1}}>
        <h3 style={{fontSize:'1.1rem',fontWeight:700,lineHeight:1.3,transition:'color 0.25s',color:hovered&&index===0?'oklch(0.85 0.1 290)':'var(--text)'}}>
          {project.title}
        </h3>
        <StatusDot status={project.status} />
      </div>

      <p style={{color:'var(--text-dim)',fontSize:'0.88rem',lineHeight:1.7,marginBottom:20,flex:1,position:'relative',zIndex:1}}>{project.desc}</p>

      {/* Tags */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20,position:'relative',zIndex:1}}>
        {project.tags.map((t,ti)=>(
          <span key={t} style={{
            background:'var(--primary-subtle)',border:'1px solid oklch(0.62 0.30 290 / 0.2)',
            borderRadius:6,padding:'3px 10px',fontSize:'0.7rem',fontFamily:'var(--font-mono)',
            color:'var(--primary)',transition:'all 0.2s ease',transitionDelay:`${ti*0.04}s`,
            transform:hovered?'translateY(-2px)':'none',
            boxShadow:hovered?'0 4px 10px oklch(0.62 0.30 290 / 0.2)':'none',
          }}>{t}</span>
        ))}
      </div>

      {/* Notification toast */}
      {notif&&(
        <div style={{
          position:'fixed',top:32,left:'50%',transform:'translateX(-50%)',zIndex:9999,
          animation:notif==='leaving'?'notifOut 0.4s ease forwards':'notifIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards',
        }}>
          <div style={{
            background:'oklch(0.12 0.03 270 / 0.85)',backdropFilter:'blur(24px)',
            WebkitBackdropFilter:'blur(24px)',
            border:'1px solid oklch(0.62 0.30 290 / 0.25)',borderRadius:16,
            padding:'16px 28px',display:'flex',alignItems:'center',gap:14,
            boxShadow:'0 8px 40px oklch(0 0 0 / 0.5), 0 0 30px var(--primary-glow)',
          }}>
            <div style={{
              width:36,height:36,borderRadius:'50%',background:'var(--primary-subtle)',
              border:'1px solid oklch(0.62 0.30 290 / 0.3)',
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
            }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </div>
            <div>
              <p style={{fontWeight:600,fontSize:'0.9rem',color:'var(--text)',marginBottom:2}}>Not Open Source</p>
              <p style={{fontSize:'0.75rem',color:'var(--text-dim)',fontFamily:'var(--font-mono)'}}>These projects are not open source</p>
            </div>
            <button onClick={()=>setNotif(null)} style={{
              background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',
              padding:4,display:'flex',marginLeft:8,transition:'color 0.2s',
            }}
              onMouseEnter={e=>e.currentTarget.style.color='var(--text)'}
              onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      )}

      {/* Buttons */}
      <div style={{display:'flex',gap:10,position:'relative',zIndex:1}}>
        <MagneticWrap><button onClick={showNotif}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.color='var(--primary)';e.currentTarget.style.boxShadow='0 0 20px var(--primary-glow)';e.currentTarget.style.transform='translateY(-2px)'}}

          style={{padding:'8px 16px',fontSize:'0.78rem',flex:1,justifyContent:'center',cursor:'pointer',border:'1px solid var(--glass-border)',background:'transparent',color:'var(--text)',fontFamily:'var(--font-body)',display:'inline-flex',alignItems:'center',gap:8,borderRadius:100,fontWeight:600,transition:'all 0.35s cubic-bezier(0.34,1.56,0.64,1)',position:'relative',overflow:'hidden',textDecoration:'none'}}>{svgGitHub()} Code</button></MagneticWrap>
        {project.liveUrl
          ? <MagneticWrap><a href={project.liveUrl} target="_blank" rel="noopener noreferrer" className="btn-ghost" style={{padding:'8px 16px',fontSize:'0.78rem',flex:1,justifyContent:'center'}}>{svgExternal()} Live</a></MagneticWrap>
          : <span className="btn-ghost" style={{padding:'8px 16px',fontSize:'0.78rem',flex:1,justifyContent:'center',opacity:0.35,cursor:'not-allowed'}}>In Progress</span>

    </div>
  );

function ShowMoreBtn(){

function App(){
  useEffect(()=>{
    // Re-run scroll reveal observer after React mounts
    setTimeout(()=>{
      document.querySelectorAll('.reveal').forEach(el=>revealObserver.observe(el));
    },500);
  },[]);

  return(
    <div>
      <Dock />
      <Hero />
      <div style={{width:'100%',height:'1px',background:'linear-gradient(to right,transparent,var(--glass-border),transparent)',position:'relative',zIndex:1}} />
      <AboutSection />
      <div style={{width:'100%',height:'1px',background:'linear-gradient(to right,transparent,var(--glass-border),transparent)',position:'relative',zIndex:1}} />
      <SkillsSection />
      <div style={{width:'100%',height:'1px',background:'linear-gradient(to right,transparent,var(--glass-border),transparent)',position:'relative',zIndex:1}} />
      <ExperienceSection />
      <div style={{width:'100%',height:'1px',background:'linear-gradient(to right,transparent,var(--glass-border),transparent)',position:'relative',zIndex:1}} />
      <ProjectsSection />
      <div style={{width:'100%',height:'1px',background:'linear-gradient(to right,transparent,var(--glass-border),transparent)',position:'relative',zIndex:1}} />
      <ContactSection />
      <FooterSection />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
