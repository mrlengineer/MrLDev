    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --purple-dim: oklch(0.55 0.22 290);
      --purple-glow: oklch(0.65 0.28 290 / 0.35);
      --purple-subtle: oklch(0.65 0.28 290 / 0.08);
      --bg: oklch(0.08 0.01 270);

      --bg3: oklch(0.14 0.018 270);
      --text: oklch(0.93 0.01 270);
      --text-dim: oklch(0.65 0.02 270);
      --border: oklch(0.25 0.03 270 / 0.6);
      --font-body: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

    html { scroll-behavior: smooth; }

      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
      line-height: 1.6;

    ::-webkit-scrollbar-thumb { background: var(--purple-dim); border-radius: 3px; }

    /* Canvas stars */

      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow button */
    .btn-glow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: transparent;
      border: 1.5px solid var(--purple);
      border-radius: 100px;
      color: var(--purple);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--purple);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .btn-glow:hover {
      box-shadow: 0 0 24px var(--purple-glow), 0 0 48px var(--purple-glow);
      color: #fff;

    .btn-glow:hover::before { opacity: 0.15; }

      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--purple);
      border: none;
      border-radius: 100px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: all 0.25s ease;
      box-shadow: 0 0 20px var(--purple-glow);
    }
    .btn-solid:hover {
      box-shadow: 0 0 36px var(--purple-glow), 0 0 60px var(--purple-glow);

    }

    /* Section wrapper */

      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 32px;

      color: var(--purple);

      text-transform: uppercase;

      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 48px;
    }

      position: relative;
      z-index: 1;

    .fade-up-d2 { animation-delay: 0.2s; }
    .fade-up-d3 { animation-delay: 0.3s; }

  <script>
    // Star / particle background
    (function () {
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, stars = [], animId;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            alpha: Math.random() * 0.7 + 0.1,
            speed: Math.random() * 0.12 + 0.02,
            drift: (Math.random() - 0.5) * 0.08,
            twinkle: Math.random() * Math.PI * 2,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.twinkle += s.twinkleSpeed;
          const a = s.alpha * (0.6 + 0.4 * Math.sin(s.twinkle));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 170, 255, ${a})`;
          ctx.fill();
          s.y -= s.speed;
          s.x += s.drift;
          if (s.y < -2) { s.y = H + 2; s.x = Math.random() * W; }
        });
        // Subtle nebula orbs
        const nebula = [
          { x: W * 0.15, y: H * 0.3, r: 280, c: '120,60,220' },
          { x: W * 0.85, y: H * 0.7, r: 220, c: '90,30,180' },
        ];
        nebula.forEach(n => {
          const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
          g.addColorStop(0, `rgba(${n.c},0.06)`);
          g.addColorStop(1, `rgba(${n.c},0)`);
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        });
        animId = requestAnimationFrame(draw);
      }

      resize();
      createStars(200);
      draw();
      window.addEventListener('resize', () => { resize(); createStars(200); });
    })();
  </script>

    /* ──────────────────────────────── TYPEWRITER ──────────────────────────────── */
    function Typewriter({ words }) {
      const [idx, setIdx] = useState(0);
      const [text, setText] = useState('');
      const [deleting, setDeleting] = useState(false);
      const [paused, setPaused] = useState(false);

      useEffect(() => {
        if (paused) {
          const t = setTimeout(() => setPaused(false), 1400);
          return () => clearTimeout(t);
        }
        const word = words[idx % words.length];
        let timeout;
        if (!deleting) {
          if (text.length < word.length) {
            timeout = setTimeout(() => setText(word.slice(0, text.length + 1)), 80);
          } else {
            setPaused(true);
            setTimeout(() => setDeleting(true), 1200);
          }
        } else {
          if (text.length > 0) {
            timeout = setTimeout(() => setText(text.slice(0, -1)), 45);
          } else {
            setDeleting(false);
            setIdx(i => i + 1);
          }
        }
        return () => clearTimeout(timeout);
      }, [text, deleting, paused, idx, words]);

      return (
        <span>
          <span style={{ color: 'var(--purple)' }}>{text}</span>
          <span style={{ animation: 'blink 1s step-end infinite', color: 'var(--purple)', marginLeft: 2 }}>|</span>
        </span>
      );
    }

      useEffect(() => {

          {getOverlay()}

          {project.image && (
            <div style={{ marginBottom: 20, borderRadius: 12, overflow: 'hidden', height: 130, background: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid var(--border)', position:'relative', zIndex:1 }}>
              <img src={project.image} alt={project.title} style={{
                width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center',
                transition: 'transform 0.4s ease, filter 0.4s ease',
                transform: hovered ? 'scale(1.05)' : 'scale(1)',
                filter: hovered ? 'brightness(1.1)' : 'brightness(0.95)',
              }} />
            </div>
          )}

          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 20, position:'relative', zIndex:1 }}>
            {project.icon && (
              <div style={{ width: 52, height: 52, borderRadius: 14, background: 'var(--purple-subtle)', border: '1px solid var(--purple)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-mono)', fontSize: '0.75rem', fontWeight: 700, color: 'var(--purple)' }}>
                {project.icon}
              </div>
            )}
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginLeft: project.icon ? 0 : 'auto' }}>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: statusColor[project.status], boxShadow: `0 0 ${hovered ? 12 : 8}px ${statusColor[project.status]}88`, flexShrink: 0, transition: 'box-shadow 0.3s' }}></span>
              <span style={{ fontSize: '0.75rem', fontFamily: 'var(--font-mono)', color: 'var(--text-dim)' }}>{project.status}</span>
            </div>
          </div>

          <h3 style={{ fontSize: '1.15rem', fontWeight: 700, marginBottom: 12, lineHeight: 1.3, position:'relative', zIndex:1,
            transition: 'color 0.25s',
            color: hovered && index === 0 ? 'oklch(0.85 0.1 290)' : 'var(--text)',
          }}>{project.title}</h3>
          <p style={{ color: 'var(--text-dim)', fontSize: '0.9rem', lineHeight: 1.7, marginBottom: 24, flex: 1, position:'relative', zIndex:1 }}>{project.desc}</p>

          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 24, position:'relative', zIndex:1 }}>
            {project.tags.map((t, ti) => (
              <span key={t} style={{
                background: 'var(--purple-subtle)',
                border: '1px solid oklch(0.65 0.28 290 / 0.25)',
                borderRadius: 6, padding: '3px 10px',
                fontSize: '0.75rem', fontFamily: 'var(--font-mono)', color: 'var(--purple)',
                transition: 'all 0.2s ease',
                transitionDelay: `${ti * 0.04}s`,
                transform: hovered ? 'translateY(-2px)' : 'none',
                boxShadow: hovered ? '0 4px 10px oklch(0.65 0.28 290/0.2)' : 'none',
              }}>{t}</span>
            ))}
          </div>

          <div style={{ display: 'flex', gap: 12, position:'relative', zIndex:1 }}>
            <CodeBtn href={project.codeUrl || 'https://github.com/mrlengineer'} index={index} />
            {project.liveUrl
              ? <LiveBtn href={project.liveUrl} index={index} />
              : <span className="btn-glow" style={{ padding: '8px 18px', fontSize: '0.8rem', flex: 1, justifyContent: 'center', opacity: 0.35, cursor: 'not-allowed' }}>In Progress</span>
            }
          </div>
        </div>
      );
    }

    function CodeBtn({ href, index }) {
      const [h, setH] = useState(false);
      // Each project gets a different Code button animation
      const anims = [
        // 0: border draw effect
        { border: h ? '1.5px solid var(--purple)' : '1.5px solid var(--purple)', transform: h ? 'scale(1.04)' : 'none', boxShadow: h ? '0 0 16px var(--purple-glow), inset 0 0 12px oklch(0.65 0.28 290/0.08)' : 'none' },
        // 1: scale bounce
        { transform: h ? 'scale(1.08) rotate(-1deg)' : 'none', boxShadow: h ? '0 0 20px var(--purple-glow)' : 'none' },
        // 2: slide up content
        { transform: h ? 'translateY(-3px)' : 'none', boxShadow: h ? '0 8px 20px oklch(0.65 0.28 290/0.4)' : 'none' },
      ];
      const a = anims[index] || anims[0];
      return (
        <a href={href} target="_blank" rel="noopener noreferrer"
          onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
          className="btn-glow"
          style={{ padding: '8px 18px', fontSize: '0.8rem', flex: 1, justifyContent: 'center', transition: 'all 0.25s cubic-bezier(0.34,1.56,0.64,1)', ...a }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style={{transition:'transform 0.3s', transform: h ? 'rotate(10deg)' : 'none'}}><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          Code
        </a>
      );
    }

    function LiveBtn({ href, index }) {
      const [h, setH] = useState(false);
      const anims = [
        // 0: pulse dot grows
        { transform: h ? 'scale(1.04)' : 'none', boxShadow: h ? '0 0 22px var(--purple-glow)' : 'none' },
        // 1: rotate slight
        { transform: h ? 'scale(1.08) rotate(1deg)' : 'none', boxShadow: h ? '0 0 22px var(--purple-glow)' : 'none' },
        // 2: slide right arrow
        { transform: h ? 'translateX(3px)' : 'none', boxShadow: h ? '0 0 18px var(--purple-glow)' : 'none' },
      ];
      const a = anims[index] || anims[0];
      return (
        <a href={href} target="_blank" rel="noopener noreferrer"
          onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
          className="btn-glow"
          style={{ padding: '8px 18px', fontSize: '0.8rem', flex: 1, justifyContent: 'center', transition: 'all 0.25s cubic-bezier(0.34,1.56,0.64,1)', ...a }}>
          <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"
            style={{transition:'transform 0.3s', transform: h ? 'translate(2px,-2px)' : 'none'}}>
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Live
        </a>
      );
    }

    function Projects() {
      return (
        <section id="projects" style={{ position: 'relative', zIndex: 1, background: 'oklch(0.10 0.012 270 / 0.6)' }}>
          <div className="section">
            <p className="section-label">What I've built</p>
            <h2 className="section-title">Featured <span style={{ color: 'var(--purple)' }}>Projects</span></h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 24 }}>
              {PROJECTS.map((p, i) => <ProjectCard key={p.title} project={p} index={i} />)}
            </div>
            <ShowMoreBtn />
          </div>
        </section>
      );
    }

    /* ──────────────────────────────── SHOW MORE BTN ──────────────────────────────── */
    function ShowMoreBtn() {
      const [state, setState] = useState('idle');

      function handleClick() {
        setState('clicked');
        setTimeout(() => {
          window.open('https://github.com/mrlengineer', '_blank');
          setState('idle');
        }, 900);
      }

      const isClicked = state === 'clicked';

      return (
        <div style={{ display: 'flex', justifyContent: 'center', marginTop: 56, position: 'relative' }}>
          {isClicked && (
            <div style={{
              position: 'absolute', top: '50%', left: '50%',
              transform: 'translate(-50%, -50%)',
              width: 60, height: 60, borderRadius: '50%',
              border: '2px solid var(--purple)',
              animation: 'rippleOut 0.9s ease-out forwards',
              pointerEvents: 'none',
            }} />
          )}
          <button
            onClick={handleClick}
            onMouseEnter={() => !isClicked && setState('hover')}
            onMouseLeave={() => !isClicked && setState('idle')}
            style={{
              position: 'relative',
              display: 'inline-flex', alignItems: 'center', gap: 12,
              padding: '16px 40px',
              background: isClicked ? 'var(--purple)' : 'transparent',
              border: '1.5px solid var(--purple)',
              borderRadius: 100,
              color: isClicked ? '#fff' : 'var(--purple)',
              fontFamily: 'var(--font-mono)',
              fontSize: '0.9rem', fontWeight: 600,
              letterSpacing: '0.06em',
              cursor: isClicked ? 'default' : 'pointer',
              transition: 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)',
              boxShadow: state === 'hover' ? '0 0 32px var(--purple-glow), 0 0 64px var(--purple-glow)' : isClicked ? '0 0 48px var(--purple-glow)' : 'none',
              transform: state === 'hover' ? 'scale(1.06)' : isClicked ? 'scale(0.96)' : 'scale(1)',
              overflow: 'hidden',
            }}
          >
            <div style={{
              position: 'absolute', inset: 0,
              background: 'linear-gradient(105deg, transparent 40%, oklch(1 0 0 / 0.12) 50%, transparent 60%)',
              backgroundSize: '200% 100%',
              animation: state === 'hover' ? 'shimmerBtn 0.6s ease forwards' : 'none',
              borderRadius: 100, pointerEvents: 'none',
            }} />
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
              style={{ transition: 'transform 0.6s', transform: isClicked ? 'rotate(360deg)' : 'none' }}>
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            {isClicked ? 'Opening GitHub...' : 'Show More'}
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"
              style={{ transition: 'transform 0.3s', transform: state === 'hover' ? 'translateX(5px)' : 'none' }}>
              <path d="M5 12h14M12 5l7 7-7 7" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
          <style>{`
            @keyframes rippleOut {
              0%   { width: 60px; height: 60px; opacity: 1; }
              100% { width: 340px; height: 340px; opacity: 0; }
            }
            @keyframes shimmerBtn {
              from { background-position: 200% center; }
              to   { background-position: -200% center; }
            }
          `}</style>
        </div>
      );
    }

    /* ──────────────────────────────── EDUCATION ──────────────────────────────── */
    function Education() {
      return (
        <section id="education" style={{ position: 'relative', zIndex: 1 }}>
          <div className="section">
            <p className="section-label">How I learned</p>
            <h2 className="section-title">Education & <span style={{ color: 'var(--purple)' }}>Learning</span></h2>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 24 }}>

              <div style={{
                background: 'var(--bg2)',
                border: '1px solid var(--border)',
                borderRadius: 20,
                padding: '36px 32px',
                position: 'relative',
                overflow: 'hidden',
                transition: 'border-color 0.3s',
              }}
                onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--purple)'}
                onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
              >
                <div style={{ position: 'absolute', bottom: -40, right: -40, width: 180, height: 180, background: 'radial-gradient(circle, var(--purple-subtle), transparent 70%)', pointerEvents: 'none' }}></div>

                <div style={{ width: 56, height: 56, borderRadius: 16, background: 'var(--purple-subtle)', border: '1px solid var(--purple)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20, fontSize: '1.6rem' }}>
                  <svg width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24" style={{color:'var(--purple)'}}><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>

                <h3 style={{ fontSize: '1.15rem', fontWeight: 700, marginBottom: 8, lineHeight: 1.3 }}>Self-Taught Developer</h3>
                <p style={{ color: 'var(--purple)', fontFamily: 'var(--font-mono)', fontSize: '0.82rem', marginBottom: 16 }}>Full Stack Specialization</p>
                <p style={{ color: 'var(--text-dim)', fontSize: '0.9rem', lineHeight: 1.75 }}>
                  Focused on frontend, backend, databases, and clean code. Learning through hands-on projects, open-source resources, and real-world challenges.
                </p>

                <div style={{ marginTop: 24, display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {['Frontend Development', 'Backend & APIs', 'Database Design', 'Clean Code Practices'].map(item => (
                    <div key={item} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--purple)', flexShrink: 0 }}></div>
                      <span style={{ fontSize: '0.85rem', color: 'var(--text-dim)' }}>{item}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Learning resources */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {[
                  { title: 'The Odin Project', subtitle: 'Full Stack Curriculum', icon: 'OP' },
                  { title: 'MDN Web Docs', subtitle: 'Web Standards & APIs', icon: 'MDN' },
                  { title: 'Personal Projects', subtitle: 'Learning by Building', icon: '//' },
                ].map(r => (
                  <div key={r.title} style={{
                    background: 'var(--bg2)',
                    border: '1px solid var(--border)',
                    borderRadius: 16,
                    padding: '20px 24px',
                    display: 'flex', alignItems: 'center', gap: 16,
                    transition: 'all 0.25s ease',
                    cursor: 'default',
                  }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--purple)'; e.currentTarget.style.transform = 'translateX(6px)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.transform = 'none'; }}
                  >
                    <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--purple-subtle)', border: '1px solid oklch(0.65 0.28 290 / 0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--font-mono)', fontSize: '0.65rem', fontWeight: 700, color: 'var(--purple)', flexShrink: 0 }}>
                      {r.icon}
                    </div>
                    <div>
                      <p style={{ fontWeight: 600, fontSize: '0.95rem', marginBottom: 2 }}>{r.title}</p>
                      <p style={{ color: 'var(--text-dim)', fontSize: '0.82rem' }}>{r.subtitle}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ──────────────────────────────── ABOUT ──────────────────────────────── */
    function About() {
      return (
        <section id="about" style={{ position: 'relative', zIndex: 1 }}>
          <div className="section" style={{ paddingTop: 80 }}>
            <p className="section-label">Get to know me</p>
            <h2 className="section-title">About <span style={{ color: 'var(--purple)' }}>Me</span></h2>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 40, alignItems: 'center' }}>
              <div>
                <p style={{ color: 'var(--text-dim)', lineHeight: 1.85, marginBottom: 20, fontSize: '1rem' }}>
                  I'm a Junior Full Stack Developer with a passion for writing clean, efficient code and building meaningful products. I focus on understanding how things work under the hood — not just making them work.
                </p>
                <p style={{ color: 'var(--text-dim)', lineHeight: 1.85, marginBottom: 32, fontSize: '1rem' }}>
                  Currently growing at KaliumLabs while exploring side projects that push my skills in React, Node.js, and PostgreSQL.
                </p>
                <a href="#projects" className="btn-solid">View My Work</a>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                {[
                  { label: 'Projects', value: '3+', desc: 'Completed' },
                  { label: 'Stack', value: 'Full', desc: 'Frontend & Backend' },
                  { label: 'Focus', value: '100%', desc: 'Clean Code' },
                  { label: 'Status', value: '🟢', desc: 'Available' },
                ].map(s => (
                  <div key={s.label} style={{
                    background: 'var(--bg2)',
                    border: '1px solid var(--border)',
                    borderRadius: 16,
                    padding: '24px 20px',
                    textAlign: 'center',
                    transition: 'border-color 0.25s',
                  }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--purple)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border)'}
                  >
                    <div style={{ fontSize: '1.8rem', fontWeight: 700, color: 'var(--purple)', marginBottom: 4, fontFamily: 'var(--font-mono)' }}>{s.value}</div>
                    <div style={{ fontSize: '0.75rem', color: 'var(--text-dim)', fontFamily: 'var(--font-mono)' }}>{s.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ──────────────────────────────── FOOTER ──────────────────────────────── */
    function Footer() {
      return (
        <footer style={{ position: 'relative', zIndex: 1, borderTop: '1px solid var(--border)', padding: '40px 32px', textAlign: 'center' }}>
          <p style={{ fontFamily: 'var(--font-mono)', fontSize: '0.78rem', color: 'var(--text-dim)' }}>
            Designed & built by{' '}
            <span style={{ color: 'var(--purple)' }}>Mr L</span>
            {' '}· 2025
          </p>
          <p style={{ fontFamily: 'var(--font-mono)', fontSize: '0.72rem', color: 'oklch(0.4 0.02 270)', marginTop: 6 }}>
            {'< Built with React & 💜 />'}
          </p>
        </footer>
      );
    }

    /* ──────────────────────────────── APP ──────────────────────────────── */
    function App() {
      return (
        <div>
          <Navbar />
          <Hero />
          <div className="section-divider"></div>
          <About />
          <div className="section-divider"></div>
          <Skills />
          <div className="section-divider"></div>
          <Experience />
          <div className="section-divider"></div>
          <Projects />
          <div className="section-divider"></div>
          <Education />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    @media (max-width: 768px) {
      .nav-links { display: none !important; }
      .hamburger { display: flex !important; }
    }
  </style>
</body>
</html>
